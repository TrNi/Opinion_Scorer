<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Ranking Task</title>
    <style>
        /* High Density Reset */
        body { font-family: sans-serif; background-color: #eee; margin: 0; padding: 5px; color: #111; }
        .container { max-width: 99vw; margin: 0 auto; background: white; padding: 10px; border-radius: 4px; }
        .hidden { display: none !important; }
        
        /* Compact Header */
        .header-instruction { background-color: #e9ecef; padding: 8px 12px; border-left: 4px solid #007bff; margin-bottom: 10px; font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
        .header-instruction p { margin: 0; }
        .slide-counter { font-weight: bold; font-size: 1.1em; color: #007bff; }

        /* 3-Column Grid Layout */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .empty-cell { visibility: hidden; } /* Keeps the grid structure but hides content */

        /* Image Cards */
        .image-card { display: flex; flex-direction: column; align-items: center; border: 1px solid #ccc; padding: 1px; background: #fafafa; border-radius: 2px; }
        .reference-card { border: 1px solid #007bff; background: #f0f8ff; }
        .img-title { font-weight: bold; margin-bottom: 3px; font-size: 0.85em; text-align: center; }
        
        /* Maximize Image Height dynamically */
        img { width: 100%; height: 36vh; object-fit: contain; margin-bottom: 7px; background-color: #ddd; }

        /* Compact Radio Buttons */
        .rank-options { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .rank-options label { cursor: pointer; padding: 4px 6px; border: 1px solid #bbb; border-radius: 3px; background: white; font-size: 0.8em; }
        .rank-options input[type="radio"] { display: none; }
        .rank-options input[type="radio"]:checked + span { color: #007bff; font-weight: bold; }
        .rank-options label:has(input[type="radio"]:checked) { border-color: #007bff; background-color: #e6f2ff; }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 15px; align-items: center; margin-top: 5px; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .submit-btn { background-color: #dc3545; }
        .submit-btn:hover { background-color: #a71d2a; }
        .error { color: #dc3545; font-weight: bold; font-size: 0.9em; margin-left: 10px; }

        /* Login Screen */
        .login-group { margin-bottom: 10px; }
        .login-group input { width: 300px; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>Start Evaluation Session</h2>
        <div class="login-group">
            <label for="subject-id">Subject ID:</label><br>
            <input type="text" id="subject-id" placeholder="e.g., subject_01">
        </div>
        <div class="login-group">
            <label for="b2-key">B2 Authorization Token:</label><br>
            <input type="password" id="b2-key" placeholder="Enter B2 download auth token">
        </div>
        <button onclick="startSession()">Load Images</button>
        <div id="login-error" class="error" style="margin-left:0; margin-top:10px;"></div>
    </div>

    <div id="task-screen" class="hidden">
        <div class="header-instruction">
            <p><strong>Instruction:</strong> Rank model predictions by closeness to the GT blurry image. (1 = Best/Closest, 4 = Worst).</p>
            <div class="slide-counter">Slide <span id="current-slide">0</span> / <span id="total-slides">0</span></div>
        </div>
        
        <div class="image-grid" id="image-grid">
            </div>

        <div class="controls">
            <button onclick="nextSlide()" id="next-btn">Next Slide & Save</button>
            <button onclick="confirmSubmit()" class="submit-btn">Finish & Submit</button>
            <div id="validation-error" class="error"></div>
        </div>
    </div>

    <div id="completion-screen" class="hidden" style="text-align: center; padding: 40px;">
        <h2>Session Complete</h2>
        <p>Thank you. All your responses have been logged securely.</p>
        <p>You may now close this window.</p>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const CSV_URL = 'images.csv';
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfqReghoS2CrQI0QXc9FLsGEK88nacIoU7Ln57gZ7Na7x8fr9-m8wE0qjGt7Ch3vWcWA/exec'; 

    // --- STATE ---
    let subjectId = '';
    let b2AuthToken = '';
    let sessionId = ''; 
    let allSlides = [];
    let currentSlideIndex = 0;

    const titles = [
        "Blurry GT Image",
        "Model 1 Prediction",
        "Model 2 Prediction",
        "Model 3 Prediction",
        "Model 4 Prediction"
    ];

    async function startSession() {
        subjectId = document.getElementById('subject-id').value.trim();
        b2AuthToken = document.getElementById('b2-key').value.trim();
        const errorDiv = document.getElementById('login-error');

        if (!subjectId || !b2AuthToken) {
            errorDiv.innerText = "Please provide both Subject ID and B2 Key.";
            return;
        }
        
        sessionId = `sess_${Date.now()}`;
        errorDiv.innerText = "Loading CSV...";

        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error("Could not fetch CSV.");
            const text = await response.text();
            
            allSlides = text.trim().split('\n').map(line => line.split(',').map(url => url.trim()));
            if (allSlides.length === 0) throw new Error("CSV is empty.");

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('task-screen').classList.remove('hidden');
            document.getElementById('total-slides').innerText = allSlides.length;
            
            renderSlide();
        } catch (err) {
            errorDiv.innerText = err.message;
        }
    }

    function renderSlide() {
        document.getElementById('current-slide').innerText = currentSlideIndex + 1;
        document.getElementById('validation-error').innerText = '';
        
        const rowData = allSlides[currentSlideIndex];
        const grid = document.getElementById('image-grid');
        grid.innerHTML = '';

        const getUrl = (url) => url ? `${url}?Authorization=${encodeURIComponent(b2AuthToken)}` : '';

        const buildCard = (title, url, isModel, modelIndex, isReference) => {
            if (!url) return `<div class="image-card" style="visibility: hidden;"></div>`;
            let html = `<div class="image-card ${isReference ? 'reference-card' : ''}">
                            <div class="img-title">${title}</div>
                            <img src="${url}" alt="${title}">`;
            if (isModel) {
                html += `<div class="rank-options">`;
                // Ranks 1 to 4
                [1, 2, 3, 4].forEach(rank => {
                    html += `<label>
                                <input type="radio" name="model_${modelIndex}" value="${rank}" onclick="handleExclusive(this)">
                                <span>Rank ${rank}</span>
                             </label>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        };

        // Top Row: Col 1, Col 2, Col 3
        grid.innerHTML += buildCard(titles[0], getUrl(rowData[0]), false, null, true);  // GT (Reference)
        grid.innerHTML += buildCard(titles[1], getUrl(rowData[1]), true, 1, false);     // Model 1
        grid.innerHTML += buildCard(titles[2], getUrl(rowData[2]), true, 2, false);     // Model 2

        // Bottom Row: Col 1 (Empty), Col 2, Col 3
        grid.innerHTML += `<div class="empty-cell"></div>`;                             // Empty
        grid.innerHTML += buildCard(titles[3], getUrl(rowData[3]), true, 3, false);     // Model 3
        grid.innerHTML += buildCard(titles[4], getUrl(rowData[4]), true, 4, false);     // Model 4
    }

    window.handleExclusive = function(clickedRadio) {
        const rankValue = clickedRadio.value;
        const allRadios = document.querySelectorAll(`input[type="radio"][value="${rankValue}"]`);
        allRadios.forEach(radio => {
            if (radio !== clickedRadio) radio.checked = false;
        });
    };

    window.nextSlide = function() {
        const currentSlideData = allSlides[currentSlideIndex];
        const numModels = 4; // Updated to 4 models

        const selectedRadios = document.querySelectorAll('input[type="radio"]:checked');
        if (selectedRadios.length < numModels) {
            document.getElementById('validation-error').innerText = `Please assign a unique rank to all ${numModels} models.`;
            return;
        }

        const btn = document.getElementById('next-btn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        let slideRankings = {};
        selectedRadios.forEach(radio => { slideRankings[radio.name] = radio.value; });

        // Send data for THIS slide immediately
        const payload = {
            session_id: sessionId,
            subject_id: subjectId,
            slide: currentSlideIndex + 1,
            gt_url: currentSlideData[0] || '', // Changed to log GT instead of Sharp
            rankings: slideRankings
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(() => {
            btn.disabled = false;
            btn.innerText = "Next Slide & Save";
            
            if (currentSlideIndex < allSlides.length - 1) {
                currentSlideIndex++;
                renderSlide();
            } else {
                showCompletion();
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerText = "Next Slide & Save";
            document.getElementById('validation-error').innerText = "Network error saving data. Check your connection.";
        });
    };

    window.confirmSubmit = function() {
        if(confirm("Are you sure you want to finish and submit early? Uncompleted slides will be skipped.")) {
            showCompletion();
        }
    };

    function showCompletion() {
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('completion-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
