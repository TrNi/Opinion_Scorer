<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Ranking Task</title>
    <style>
        /* Extreme High-Density Reset */
        body { font-family: sans-serif; background-color: #fff; margin: 0; padding: 0; color: #111; overflow-x: hidden; }
        .container { width: 100vw; max-width: 100%; margin: 0; padding: 4px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* 3-Column Grid Layout with Minimal Margins */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }

        /* Image Cards (No Padding, No Borders) */
        .image-card { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 0; padding: 0; }
        .img-title { font-weight: bold; margin-bottom: 2px; font-size: 0.9em; text-align: center; background: #fff; width: 100%; }
        
        /* Maximize Image Size - Keeps aspect ratio, fills horizontal space */
        img { width: 100%; height: 42vh; object-fit: contain; display: block; margin: 0; }

        /* Compact Radio Buttons - Strictly Grayscale */
        .rank-options { display: flex; gap: 4px; justify-content: center; width: 100%; margin-top: 4px; margin-bottom: 4px; }
        .rank-options label { cursor: pointer; padding: 4px 8px; border: 1px solid #ccc; border-radius: 2px; background: #f9f9f9; font-size: 0.85em; }
        .rank-options input[type="radio"] { display: none; }
        .rank-options input[type="radio"]:checked + span { color: #000; font-weight: bold; }
        .rank-options label:has(input[type="radio"]:checked) { border-color: #000; background-color: #e0e0e0; }

        /* UI Panel in Bottom Left - Completely Colorless */
        .ui-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; background: transparent; border: none; height: 42vh; box-sizing: border-box; }
        .instruction-text { font-size: 0.95em; line-height: 1.4; margin-bottom: 15px; text-align: center; }
        .slide-counter { font-weight: bold; font-size: 1.1em; color: #000; text-align: center; margin-bottom: 20px; }
        
        /* Buttons inside UI Panel - Minimalist */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; width: auto; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; background-color: transparent; color: #000; border: 1px solid #000; border-radius: 2px; font-weight: normal; width: auto; }
        button:hover { background-color: #f0f0f0; }
        button:disabled { border-color: #ccc; color: #999; cursor: not-allowed; }

        /* Login Screen */
        #login-screen { padding: 20px; max-width: 400px; margin: 50px auto; background: #fff; border: 1px solid #ccc; border-radius: 4px;}
        .login-group { margin-bottom: 15px; }
        .login-group input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="margin-top:0;">Start Session</h2>
        <div class="login-group">
            <label for="subject-id">Subject ID:</label>
            <input type="text" id="subject-id" placeholder="e.g., subject_01">
        </div>
        <div class="login-group">
            <label for="b2-key">B2 Authorization Token:</label>
            <input type="password" id="b2-key" placeholder="Enter B2 token">
        </div>
        <button onclick="startSession()" style="width: 100%;">Load Images</button>
        <div id="login-error" class="error" style="margin-top:10px;"></div>
    </div>

    <div id="task-screen" class="hidden">
        <div class="image-grid" id="image-grid">
            </div>
    </div>

    <div id="completion-screen" class="hidden" style="text-align: center; padding: 50px;">
        <h2>Session Complete</h2>
        <p>Thank you. All your responses have been logged securely.</p>
        <p>You may now close this window.</p>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const CSV_URL = 'images.csv';
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzadzHFyAAF2EmyYQuKJqLfDDFgWDJuQBJ_XatnbYpCzHzDH4VMivhcfNIw1m893xz6_w/exec';
        //'https://script.google.com/macros/s/AKfycbwfqReghoS2CrQI0QXc9FLsGEK88nacIoU7Ln57gZ7Na7x8fr9-m8wE0qjGt7Ch3vWcWA/exec';
        //'https://script.google.com/macros/s/AKfycbwfqReghoS2CrQI0QXc9FLsGEK88nacIoU7Ln57gZ7Na7x8fr9-m8wE0qjGt7Ch3vWcWA/exec'; 

    // --- STATE ---
    let subjectId = '';
    let b2AuthToken = '';
    let sessionId = ''; 
    let allSlides = [];
    let currentSlideIndex = 0;

    const titles = [
        "Blurry GT Image",
        "Model 1 Prediction",
        "Model 2 Prediction",
        "Model 3 Prediction",
        "Model 4 Prediction"
    ];

    async function startSession() {
        subjectId = document.getElementById('subject-id').value.trim();
        b2AuthToken = document.getElementById('b2-key').value.trim();
        const errorDiv = document.getElementById('login-error');

        if (!subjectId || !b2AuthToken) {
            errorDiv.innerText = "Please provide both Subject ID and B2 Key.";
            return;
        }
        
        sessionId = `sess_${Date.now()}`;
        errorDiv.innerText = "Loading CSV...";

        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error("Could not fetch CSV.");
            const text = await response.text();
            
            allSlides = text.trim().split('\n').map(line => line.split(',').map(url => url.trim()));
            if (allSlides.length === 0) throw new Error("CSV is empty.");

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('task-screen').classList.remove('hidden');
            
            renderSlide();
        } catch (err) {
            errorDiv.innerText = err.message;
            errorDiv.style.color = 'black'; // Keep error neutral too
        }
    }

    function renderSlide() {
        const rowData = allSlides[currentSlideIndex];
        const grid = document.getElementById('image-grid');
        grid.innerHTML = ''; // Clear previous

        const getUrl = (url) => url ? `${url}?Authorization=${encodeURIComponent(b2AuthToken)}` : '';

        const buildCard = (title, url, isModel, modelIndex) => {
            if (!url) return `<div></div>`;
            let html = `<div class="image-card">
                            <div class="img-title">${title}</div>
                            <img src="${url}" alt="${title}">`;
            if (isModel) {
                html += `<div class="rank-options">`;
                [1, 2, 3, 4].forEach(rank => {
                    html += `<label>
                                <input type="radio" name="model_${modelIndex}" value="${rank}" onclick="handleExclusive(this)">
                                <span>Rank ${rank}</span>
                             </label>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        };

        // UI Panel HTML (Replaces the empty bottom-left cell)
        const uiPanelHTML = `
            <div class="ui-panel">
                <div class="instruction-text">
                    <strong>Instruction:</strong><br>Rank model predictions by closeness to the GT blurry image.<br>(1 = Best/Closest, 4 = Worst).
                </div>
                <div class="slide-counter">Slide ${currentSlideIndex + 1} / ${allSlides.length}</div>
                <div class="controls">
                    <button onclick="nextSlide()" id="next-btn">Next Slide & Save</button>
                    <button onclick="confirmSubmit()" id="submit-btn">Finish & Submit</button>
                    <div id="validation-error" class="error" style="color: black; margin-top: 10px;"></div>
                </div>
            </div>
        `;

        // Inject Top Row
        grid.innerHTML += buildCard(titles[0], getUrl(rowData[0]), false, null); // GT
        grid.innerHTML += buildCard(titles[1], getUrl(rowData[1]), true, 1);     // Model 1
        grid.innerHTML += buildCard(titles[2], getUrl(rowData[2]), true, 2);     // Model 2

        // Inject Bottom Row
        grid.innerHTML += uiPanelHTML;                                           // UI Panel in Bottom Left
        grid.innerHTML += buildCard(titles[3], getUrl(rowData[3]), true, 3);     // Model 3
        grid.innerHTML += buildCard(titles[4], getUrl(rowData[4]), true, 4);     // Model 4
    }

    window.handleExclusive = function(clickedRadio) {
        const rankValue = clickedRadio.value;
        const allRadios = document.querySelectorAll(`input[type="radio"][value="${rankValue}"]`);
        allRadios.forEach(radio => {
            if (radio !== clickedRadio) radio.checked = false;
        });
    };

    window.nextSlide = function() {
        const currentSlideData = allSlides[currentSlideIndex];
        const numModels = 4;

        const selectedRadios = document.querySelectorAll('input[type="radio"]:checked');
        if (selectedRadios.length < numModels - 1) {
            document.getElementById('validation-error').innerText = `Assign a unique rank to all ${numModels} models.`;
            return;
        }

        const btn = document.getElementById('next-btn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        let slideRankings = {};
        selectedRadios.forEach(radio => { slideRankings[radio.name] = radio.value; });

        const payload = {
            session_id: sessionId,
            subject_id: subjectId,
            slide: currentSlideIndex + 1,
            gt_url: currentSlideData[0] || '', 
            rankings: slideRankings
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(() => {
            if (currentSlideIndex < allSlides.length - 1) {
                currentSlideIndex++;
                renderSlide(); // Re-renders grid, automatically resetting UI state
            } else {
                showCompletion();
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerText = "Next Slide & Save";
            document.getElementById('validation-error').innerText = "Network error saving data.";
        });
    };

    window.confirmSubmit = function() {
        if(confirm("Are you sure you want to finish and submit early? Uncompleted slides will be skipped.")) {
            showCompletion();
        }
    };

    function showCompletion() {
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('completion-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
