<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Ranking Task</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #fff; margin: 0; padding: 0; color: #111; overflow-x: hidden; }
        .container { width: 100vw; max-width: 100%; margin: 0; padding: 4px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* Progress Header */
        .progress-header { display: flex; justify-content: center; gap: 6px; padding: 10px; background: #f9f9f9; border-bottom: 1px solid #ccc; margin-bottom: 10px; }
        .progress-bar { height: 12px; width: 60px; background-color: #e0e0e0; border-radius: 2px; border: 1px solid #ccc; transition: background-color 0.3s; }
        .progress-bar.filled { background-color: #28a745; border-color: #218838; } 

        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .image-card { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 0; padding: 0; }
        .img-title { font-weight: bold; margin-bottom: 2px; font-size: 0.9em; text-align: center; background: #fff; width: 100%; }
        img { width: 100%; height: 35vh; object-fit: contain; display: block; margin: 0; }

        .rank-options { display: flex; gap: 4px; justify-content: center; width: 100%; margin-top: 4px; margin-bottom: 4px; }
        .rank-options label { cursor: pointer; padding: 4px 8px; border: 1px solid #ccc; border-radius: 2px; background: #f9f9f9; font-size: 0.85em; }
        .rank-options input[type="radio"] { display: none; }
        .rank-options input[type="radio"]:checked + span { color: #000; font-weight: bold; }
        .rank-options label:has(input[type="radio"]:checked) { border-color: #000; background-color: #e0e0e0; }

        /* UI Panel */
        .ui-panel-horizontal { grid-column: 1 / -1; display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 6px 15px; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; margin: 2px 0; background: transparent; }
        .instruction-text { font-size: 0.85em; line-height: 1.3; margin: 0; }
        .middle-controls { display: flex; align-items: center; gap: 20px; }
        .slide-counter { font-weight: bold; font-size: 1.05em; color: #000; margin: 0; }
        
        .controls { display: flex; flex-direction: row; align-items: center; gap: 8px; width: auto; }
        button { padding: 6px 12px; font-size: 14px; cursor: pointer; background-color: transparent; color: #000; border: 1px solid #000; border-radius: 2px; font-weight: normal; }
        button:hover { background-color: #f0f0f0; }
        button:disabled { border-color: #ccc; color: #999; cursor: not-allowed; }

        /* Screens */
        .screen-centered { padding: 20px; max-width: 600px; margin: 50px auto; background: #fff; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        #login-screen .login-group input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; text-align: center; font-size: 1.2em; letter-spacing: 2px; }
        #instruction-screen img { height: auto; max-height: 60vh; width: 100%; object-fit: contain; border: 1px solid #ccc; margin-bottom: 15px; }
        #level-screen h1 { font-size: 2.5em; color: #28a745; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen-centered">
        <h2 style="margin-top:0;">Evaluation Login</h2>
        <div class="login-group">
            <label for="subject-id">Enter Subject ID (2 Digits):</label>
            <input type="text" id="subject-id" placeholder="00" maxlength="2" autocomplete="off">
        </div>
        <button onclick="initSession()" style="width: 100%; margin-top: 15px; padding: 12px; font-weight: bold;">Continue</button>
        <div id="login-error" style="color: black; margin-top:10px; font-weight: bold;"></div>
    </div>

    <div id="instruction-screen" class="screen-centered hidden">
        <h2>Instructions</h2>
        <img src="instructions.jpg" alt="Task Instructions">
        <p>Please review the instructions above carefully.</p>
        <button onclick="startTask()" style="padding: 12px 24px; font-size: 16px; font-weight: bold;">Start Task</button>
    </div>

    <div id="level-screen" class="screen-centered hidden">
        <h1 id="level-title">Level Complete!</h1>
        <p id="level-msg">Great job! Take a quick breath.</p>
        <button onclick="resumeTask()" style="padding: 12px 24px; margin-top: 15px; font-weight: bold;">Continue to Next Level</button>
    </div>

    <div id="task-screen" class="hidden">
        <div class="progress-header" id="progress-bar-container">
            <div class="progress-bar" id="bar-1"></div>
            <div class="progress-bar" id="bar-2"></div>
            <div class="progress-bar" id="bar-3"></div>
            <div class="progress-bar" id="bar-4"></div>
            <div class="progress-bar" id="bar-5"></div>
        </div>
        <div class="image-grid" id="image-grid"></div>
    </div>

    <div id="completion-screen" class="screen-centered hidden">
        <h2>All Levels Complete!</h2>
        <p>Thank you. All your responses have been logged securely.</p>
        <p>You may now close this window.</p>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby92z4jrHDSl-XQBwFgDUhdeaQo6mjKLdyNYLW-c4dQxq3OQYR6tQKlRU-xI6S2EZT6Zw/exec'; 
    
    // --- STATE ---
    let subjectId = '';
    let b2AuthToken = '';
    let sessionId = ''; 
    let allSlides = [];
    let currentSlideIndex = 0;

    const titles = [ "Blurry GT", "Model 1", "Model 2", "Model 3", "Model 4", "Model 5" ];

    async function initSession() {
        const inputStr = document.getElementById('subject-id').value.trim();
        const errorDiv = document.getElementById('login-error');

        if (!/^\d{2}$/.test(inputStr)) {
            errorDiv.innerText = "Please enter exactly two digits (e.g., 04, 12).";
            return;
        }
        
        subjectId = inputStr;
        sessionId = `sess_${Date.now()}`;
        errorDiv.innerText = "Authenticating with server...";

        try {
            // 1. Securely fetch the Backblaze Token from Google Apps Script
            const tokenRes = await fetch(GOOGLE_SCRIPT_URL);
            const tokenData = await tokenRes.json();
            
            if (tokenData.result !== 'success') {
                throw new Error("Server Authentication failed. Please check backend config.");
            }
            b2AuthToken = tokenData.token;

            // 2. Determine CSV based on modulo 10
            errorDiv.innerText = "Loading Dataset...";
            const csvNumber = parseInt(subjectId, 10) % 10;
            const csvUrl = `images_${csvNumber}.csv`;

            // 3. Fetch the mapped CSV
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`Could not find ${csvUrl}`);
            const text = await response.text();
            
            allSlides = text.trim().split('\n').map(line => line.split(',').map(url => url.trim()));
            if (allSlides.length === 0) throw new Error("CSV is empty.");

            // Transition to Instruction Slide
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('instruction-screen').classList.remove('hidden');
            
        } catch (err) {
            errorDiv.innerText = err.message;
        }
    }

    function startTask() {
        document.getElementById('instruction-screen').classList.add('hidden');
        document.getElementById('task-screen').classList.remove('hidden');
        renderSlide();
    }

    function renderSlide() {
        updateProgressBar();
        const rowData = allSlides[currentSlideIndex];
        const grid = document.getElementById('image-grid');
        grid.innerHTML = ''; 

        const getUrl = (url) => url ? `${url}?Authorization=${encodeURIComponent(b2AuthToken)}` : '';

        const buildCard = (title, url, isModel, modelIndex) => {
            if (!url) return `<div></div>`;
            let html = `<div class="image-card">
                            <div class="img-title">${title}</div>
                            <img src="${url}" alt="${title}">`;
            if (isModel) {
                html += `<div class="rank-options">`;
                [1, 2, 3, 4, 5].forEach(rank => {
                    html += `<label><input type="radio" name="model_${modelIndex}" value="${rank}" onclick="handleExclusive(this)"><span>Rank ${rank}</span></label>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        };

        const uiPanelHTML = `
            <div class="ui-panel-horizontal">
                <div class="instruction-text">
                    <strong>Rank model predictions</strong> (1 = Best, 5 = Worst).
                </div>
                
                <div class="middle-controls">
                    <div class="slide-counter">Slide ${currentSlideIndex + 1}</div>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label for="jump-input" style="font-size: 0.85em;">Start index:</label>
                        <input type="number" id="jump-input" placeholder="0" value="${currentSlideIndex}" onchange="jumpToIndex(this.value)" 
                               style="width: 50px; text-align: center; border: 1px solid #000; border-radius: 2px;">
                    </div>
                </div>

                <div class="controls">
                    <div id="validation-error" style="color: black; margin-right: 10px; font-size: 0.85em; font-weight:bold;"></div>
                    <button onclick="goBack()" id="back-btn" ${currentSlideIndex === 0 ? 'disabled' : ''}>Back</button>
                    <button onclick="skipSlide()" id="skip-btn">Skip</button>
                    <button onclick="nextSlide()" id="next-btn">Next & Save</button>
                </div>
            </div>
        `;

        grid.innerHTML += buildCard(titles[0], getUrl(rowData[0]), false, null); 
        grid.innerHTML += buildCard(titles[1], getUrl(rowData[1]), true, 1);     
        grid.innerHTML += buildCard(titles[2], getUrl(rowData[2]), true, 2);     

        grid.innerHTML += uiPanelHTML;                                           

        grid.innerHTML += buildCard(titles[3], getUrl(rowData[3]), true, 3);     
        grid.innerHTML += buildCard(titles[4], getUrl(rowData[4]), true, 4);     
        grid.innerHTML += buildCard(titles[5], getUrl(rowData[5]), true, 5);     
    }

    function updateProgressBar() {
        const percentage = ((currentSlideIndex) / allSlides.length) * 100;
        const barsToFill = Math.floor((percentage / 100) * 5) + 1; 

        for (let i = 1; i <= 5; i++) {
            const bar = document.getElementById(`bar-${i}`);
            if (i <= barsToFill) {
                bar.classList.add('filled');
            } else {
                bar.classList.remove('filled');
            }
        }
    }

    function checkLevelUp() {
        if (currentSlideIndex === 13) {
            triggerCelebration("Level 1 Complete!", "Great job! Take a quick breath.");
            return true;
        }
        if (currentSlideIndex === 39) {
            triggerCelebration("Level 2 Complete!", "Amazing! You are in the final stretch.");
            return true;
        }
        return false;
    }

    function triggerCelebration(title, msg) {
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('level-title').innerText = title;
        document.getElementById('level-msg').innerText = msg;
        document.getElementById('level-screen').classList.remove('hidden');
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
    }

    window.resumeTask = function() {
        document.getElementById('level-screen').classList.add('hidden');
        document.getElementById('task-screen').classList.remove('hidden');
        renderSlide();
    }

    window.jumpToIndex = function(val) {
        let newIndex = parseInt(val, 10);
        if (isNaN(newIndex) || newIndex < 0 || newIndex >= allSlides.length) {
            currentSlideIndex = 0;
        } else {
            currentSlideIndex = newIndex;
        }
        renderSlide();
    };

    window.handleExclusive = function(clickedRadio) {
        const rankValue = clickedRadio.value;
        const allRadios = document.querySelectorAll(`input[type="radio"][value="${rankValue}"]`);
        allRadios.forEach(radio => { if (radio !== clickedRadio) radio.checked = false; });
    };

    window.goBack = function() {
        if (currentSlideIndex > 0) {
            currentSlideIndex--;
            renderSlide();
        }
    };

    window.skipSlide = function() {
        submitData({ status: 'skipped' });
    };

    window.nextSlide = function() {
        const selectedRadios = document.querySelectorAll('input[type="radio"]:checked');
        if (selectedRadios.length < 5) {
            document.getElementById('validation-error').innerText = "Rank all 5 models.";
            return;
        }

        let slideRankings = {};
        selectedRadios.forEach(radio => { slideRankings[radio.name] = radio.value; });
        submitData(slideRankings);
    };

    function submitData(rankingsData) {
        const btn = document.getElementById('next-btn');
        const skipBtn = document.getElementById('skip-btn');
        btn.disabled = true;
        skipBtn.disabled = true;
        btn.innerText = "Saving...";
        document.getElementById('validation-error').innerText = ''; 

        const payload = {
            session_id: sessionId,
            subject_id: subjectId,
            slide: currentSlideIndex + 1,
            gt_url: allSlides[currentSlideIndex][0] || '', 
            rankings: rankingsData
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(() => {
            currentSlideIndex++;
            if (currentSlideIndex < allSlides.length) {
                if (!checkLevelUp()) {
                    renderSlide(); 
                }
            } else {
                document.getElementById('task-screen').classList.add('hidden');
                document.getElementById('completion-screen').classList.remove('hidden');
                confetti({ particleCount: 300, spread: 120, origin: { y: 0.5 } }); 
            }
        })
        .catch(err => {
            btn.disabled = false;
            skipBtn.disabled = false;
            btn.innerText = "Next & Save";
            document.getElementById('validation-error').innerText = "Network error saving data.";
        });
    }
</script>

</body>
</html>
