<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Prediction Ranking Task</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Header / Instructions */
        .header-instruction { background-color: #e9ecef; padding: 15px; border-left: 5px solid #007bff; margin-bottom: 25px; border-radius: 4px; font-size: 1.1em; }
        .slide-counter { font-weight: bold; margin-bottom: 20px; font-size: 1.2em; text-align: center; }

        /* Grid Layouts */
        .image-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .image-card { flex: 1; max-width: 23%; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; border-radius: 6px; background: #fafafa; }
        .reference-card { border: 2px solid #007bff; background: #f0f8ff; }
        
        .img-title { font-weight: bold; margin-bottom: 10px; text-align: center; height: 40px; display: flex; align-items: center; justify-content: center;}
        img { width: 100%; height: auto; border-radius: 4px; object-fit: cover; margin-bottom: 15px; }

        /* Radio Buttons */
        .rank-options { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .rank-options label { cursor: pointer; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 0.9em; }
        .rank-options input[type="radio"] { display: none; }
        .rank-options input[type="radio"]:checked + span { color: #007bff; font-weight: bold; }
        .rank-options label:has(input[type="radio"]:checked) { border-color: #007bff; background-color: #e6f2ff; }

        /* Controls */
        .controls { text-align: center; margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        .error { color: #dc3545; margin-top: 15px; font-weight: bold; text-align: center; }

        /* Login Screen */
        .login-group { margin-bottom: 15px; }
        .login-group input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen">
        <h2>Start Evaluation Session</h2>
        <div class="login-group">
            <label for="subject-id">Subject ID:</label>
            <input type="text" id="subject-id" placeholder="e.g., subject_01">
        </div>
        <div class="login-group">
            <label for="b2-key">B2 Authorization Token (Key):</label>
            <input type="password" id="b2-key" placeholder="Enter B2 download auth token">
        </div>
        <button onclick="startSession()">Load Images</button>
        <div id="login-error" class="error"></div>
    </div>

    <div id="task-screen" class="hidden">
        <div class="header-instruction">
            <strong>Instruction:</strong> Rank the model predictions in closeness to the GT blurry image. 
            <br>Rank 1 = closest (best performing model), Rank 4 = worst (no similarity to GT).
        </div>
        
        <div class="slide-counter">Slide <span id="current-slide">0</span> of <span id="total-slides">0</span></div>

        <div class="image-row" id="top-row">
            </div>

        <div class="image-row" id="bottom-row">
            </div>

        <div class="controls">
            <button onclick="nextSlide()">Next Slide</button>
            <div id="validation-error" class="error"></div>
        </div>
    </div>

    <div id="completion-screen" class="hidden" style="text-align: center;">
        <h2>Session Complete</h2>
        <p>Thank you. All responses have been recorded.</p>
        <button onclick="submitData()" id="submit-btn">Submit to Server</button>
        <div id="submit-status" style="margin-top:15px; font-weight:bold;"></div>
    </div>

</div>

<script>
    // --- CONFIGURATION ---
    const CSV_URL = 'images.csv';
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfqReghoS2CrQI0QXc9FLsGEK88nacIoU7Ln57gZ7Na7x8fr9-m8wE0qjGt7Ch3vWcWA/exec'; // From previous setup

    // --- STATE ---
    let subjectId = '';
    let b2AuthToken = '';
    let allSlides = [];
    let currentSlideIndex = 0;
    let responses = []; // [{ slideIndex: 0, rankings: { model1: 2, model2: 1...} }]

    const titles = [
        "Sharp, In-Focus Image",
        "Blurry GT Image",
        "Model 1 Prediction",
        "Model 2 Prediction",
        "Model 3 Prediction",
        "Model 4 Prediction"
    ];

    // --- INITIALIZATION ---
    async function startSession() {
        subjectId = document.getElementById('subject-id').value.trim();
        b2AuthToken = document.getElementById('b2-key').value.trim();
        const errorDiv = document.getElementById('login-error');

        if (!subjectId || !b2AuthToken) {
            errorDiv.innerText = "Please provide both Subject ID and B2 Key.";
            return;
        }
        errorDiv.innerText = "Loading CSV...";

        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error("Could not fetch CSV.");
            const text = await response.text();
            
            // Parse CSV (Split by newline, then comma)
            allSlides = text.trim().split('\n').map(line => line.split(',').map(url => url.trim()));
            
            if (allSlides.length === 0) throw new Error("CSV is empty.");

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('task-screen').classList.remove('hidden');
            document.getElementById('total-slides').innerText = allSlides.length;
            
            renderSlide();
        } catch (err) {
            errorDiv.innerText = err.message;
        }
    }

    // --- RENDERING ---
    function renderSlide() {
        document.getElementById('current-slide').innerText = currentSlideIndex + 1;
        document.getElementById('validation-error').innerText = '';
        
        const rowData = allSlides[currentSlideIndex];
        const topRow = document.getElementById('top-row');
        const bottomRow = document.getElementById('bottom-row');
        
        topRow.innerHTML = '';
        bottomRow.innerHTML = '';

        // Helper to construct secure URL
        const getUrl = (url) => url ? `${url}?Authorization=${encodeURIComponent(b2AuthToken)}` : '';

        // Helper to build Image Card HTML
        const buildCard = (title, url, isModel, modelIndex, isReference) => {
            if (!url) return `<div class="image-card" style="visibility: hidden;"></div>`; // Empty placeholder

            let html = `<div class="image-card ${isReference ? 'reference-card' : ''}">
                            <div class="img-title">${title}</div>
                            <img src="${url}" alt="${title}" onerror="this.onerror=null; this.src=''; this.alt='Image Failed to Load (Check B2 Key)';">`;
            
            // Add radio buttons only for models
            if (isModel) {
                html += `<div class="rank-options">`;
                [1, 2, 3, 4].forEach(rank => {
                    html += `<label>
                                <input type="radio" name="model_${modelIndex}" value="${rank}" onclick="handleExclusive(this)">
                                <span>Rank ${rank}</span>
                             </label>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        };

        // Render Top Row (Indices 0, 1, 2, 3)
        // Index 0: Sharp, Index 1: GT, Index 2: Model 1, Index 3: Model 2
        topRow.innerHTML += buildCard(titles[0], getUrl(rowData[0]), false, null, false); // Sharp
        topRow.innerHTML += buildCard(titles[1], getUrl(rowData[1]), false, null, true);  // GT (Reference)
        topRow.innerHTML += buildCard(titles[2], getUrl(rowData[2]), true, 1, false);     // Model 1
        topRow.innerHTML += buildCard(titles[3], getUrl(rowData[3]), true, 2, false);     // Model 2

        // Render Bottom Row (Indices 4, 5)
        // Index 4: Model 3, Index 5: Model 4
        bottomRow.innerHTML += buildCard(titles[4], getUrl(rowData[4]), true, 3, false);  // Model 3
        bottomRow.innerHTML += buildCard(titles[5], getUrl(rowData[5]), true, 4, false);  // Model 4
    }

    // --- LOGIC ---
    window.handleExclusive = function(clickedRadio) {
        const rankValue = clickedRadio.value;
        // Find all other radios on this slide with the same rank
        const allRadios = document.querySelectorAll(`input[type="radio"][value="${rankValue}"]`);
        
        allRadios.forEach(radio => {
            if (radio !== clickedRadio) {
                radio.checked = false; // Uncheck others sharing this rank
            }
        });
    };

    window.nextSlide = function() {
        // Count how many models actually exist on this slide
        const currentSlideData = allSlides[currentSlideIndex];
        const numModels = currentSlideData.slice(2, 6).filter(url => url !== '').length;

        // Validation
        const selectedRadios = document.querySelectorAll('input[type="radio"]:checked');
        if (selectedRadios.length < numModels) {
            document.getElementById('validation-error').innerText = `Please assign a unique rank to all ${numModels} models.`;
            return;
        }

        // Save Data
        let slideRankings = {};
        selectedRadios.forEach(radio => {
            slideRankings[radio.name] = radio.value;
        });

        responses.push({
            slide: currentSlideIndex + 1,
            sharp_url: currentSlideData[0] || '',
            rankings: slideRankings
        });

        // Advance or Complete
        if (currentSlideIndex < allSlides.length - 1) {
            currentSlideIndex++;
            renderSlide();
        } else {
            document.getElementById('task-screen').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
        }
    };

    // --- SUBMISSION ---
    window.submitData = function() {
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('submit-status');
        btn.disabled = true;
        status.innerText = "Sending data to Google Sheets...";
        status.style.color = "#007bff";

        const payload = {
            subject_id: subjectId,
            responses: responses
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.result === 'success') {
                status.innerText = "Success! You may close this window.";
                status.style.color = "green";
            } else {
                throw new Error("Backend returned an error.");
            }
        })
        .catch(err => {
            status.innerText = "Error saving data. Please check console.";
            status.style.color = "red";
            btn.disabled = false;
            console.error(err);
        });
    };
</script>

</body>
</html>
